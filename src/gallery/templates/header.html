<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title} - Photo Organizer</title>
    <style>
{styles}
    </style>
</head>
<body>
    <header>
        <div style="display:flex; align-items:center;">
            <div style="background:var(--primary-color); color:white; width:32px; height:32px; border-radius:4px; display:flex; align-items:center; justify-content:center; margin-right:12px; font-weight:bold;">P</div>
            <h1>{title}</h1>
        </div>
        <div style="display:flex; align-items:center;">
            <div class="filters">
                <button class="filter-btn active" onclick="filterGallery('all', this)">All</button>
                <button class="filter-btn" onclick="filterGallery('image', this)">Photos</button>
                <button class="filter-btn" onclick="filterGallery('video', this)">Videos</button>
            </div>
            {toggle_btn}
        </div>
    </header>
