<div id="modal" class="modal">
    <div class="modal-header">
        <div id="modal-date" style="font-weight: 500;"></div>
        <button class="close-btn" onclick="closeModal(event)">&times;</button>
    </div>

    <div class="modal-body" onclick="closeModal(event)">
        <button class="nav-btn nav-prev" onclick="event.stopPropagation(); changeSlide(-1)">&#10094;</button>
        
        <img id="modal-img" class="modal-content" src="" alt="Full size photo" onclick="event.stopPropagation()">
        
        <video id="modal-video" controls onclick="event.stopPropagation()">
            Your browser does not support the video tag.
        </video>

        <button class="nav-btn nav-next" onclick="event.stopPropagation(); changeSlide(1)">&#10095;</button>
    </div>
    
    <div class="modal-controls">
        <button id="prev-btn" class="modal-btn" onclick="changeSlide(-1)">Previous</button>
        <button id="slideshow-btn" class="modal-btn" onclick="toggleSlideshow()">Start Slideshow</button>
        <button id="next-btn" class="modal-btn" onclick="changeSlide(1)">Next</button>
    </div>
</div>
